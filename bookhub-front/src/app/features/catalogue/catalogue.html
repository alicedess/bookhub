<app-header></app-header>

<div class="container mx-auto m-10">
  <div class="p-8">
    <input #searchQuery placeholder="Rechercher un livre..." type="text" (input)="onSearchUpdated(searchQuery.value)">
    <select (change)="onSelectCategorie($event)">
      <option value="0">Choisir une catégorie</option>
      @for (categorie of categories(); track categorie.id) {
        <option value="{{categorie.id}}">{{categorie.libelle}}</option>
      }
    </select>
    <select (change)="onSelectDisponibilite($event)">
      <option value="2">Disponibilité</option>
      <option value="1">Disponibile</option>
      <option value="0">Indisponibile</option>
    </select>
  </div>

  <div class="p-8 min-h-screen">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      @if (searchResult(); as result) {
        @for (livre of searchResult()?.content; track livre.id) {
          <div
            [routerLink]="['/books', livre.id]"
            class="max-w-sm bg-[#FDFBF2] rounded-xl overflow-hidden shadow-lg border border-gray-200">

            <div class="bg-[#2D3E1E] px-4 py-3">
              <h2 class="text-[#B2C69E] text-2xl font-serif font-bold">
                {{ livre.titre }}
              </h2>
            </div>

            <div class="p-5 flex gap-6">

              <div class="w-1/3 shadow-md flex-shrink-0">
                <img
                  src="http://localhost:8080/api/books/{{livre.id}}/cover"
                  alt="Couverture"
                  class="w-full h-auto block"
                >
              </div>

              <div class="flex flex-col justify-center gap-3">
                <h3 class="text-[#8B4513] font-bold text-lg uppercase tracking-wide">
                  {{ livre.auteur.nom }} {{ livre.auteur.prenom }}
                </h3>

                <div class="flex items-center gap-2 text-[#4A5D3B] font-semibold">
            <span class="bg-[#4A5D3B] text-white rounded-full p-1">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
              </svg>
            </span>
                  <span>Disponible (1/2)</span>
                </div>

                <div class="flex items-center gap-2 text-[#4A5D3B] font-semibold">
            <span class="bg-gray-500 text-white rounded p-1">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14" />
              </svg>
            </span>
                  <span>{{ livre.nbPage }} pages</span>
                </div>
              </div>

            </div>
          </div>
        }

        <div class="pagination">
          <button [disabled]="currentPage() === 0" (click)="currentPage.set(currentPage() - 1)">Précédent</button>
          <span>Page {{ currentPage() + 1 }} sur {{ result.page.totalPages }}</span>
          <button [disabled]="currentPage() >= result.page.totalPages - 1" (click)="currentPage.set(currentPage() + 1)">Suivant</button>
        </div>
      }

    </div>
  </div>

</div>
