spring.datasource.password=Pa$$w0rd
jwt.expiration=86400000
# JWT Configuration
jwt.secret=mySecretKeyForBookhubApplicationThatIsLongEnoughForHS256Algorithm
# Affiche les valeurs des paramÒtres (les "?" dans la requõte)
