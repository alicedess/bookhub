spring.application.name=bookhub

# Profil actif par défaut (surcharger avec -Dspring.profiles.active=prod au démarrage)
spring.profiles.active=dev

# JWT
jwt.expiration=86400000

# Upload de fichiers
spring.servlet.multipart.max-file-size=2048KB
spring.servlet.multipart.max-request-size=2048KB

# JPA — Flyway gère le schéma, Spring n'en fait rien
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:migrations/schema.sql
spring.sql.init.data-locations=classpath:migrations/data.sql

# Swagger — chemin de la spec OpenAPI
springdoc.api-docs.path=/api/docs
