# DÕfinit les r¶les (optionnel)
spring.security.user.roles=ADMIN

#spring.jackson.property-naming-strategy=SNAKE_CASE

dbname=bookhub
spring.datasource.url=jdbc:sqlserver://localhost;database=${dbname};integratedSecurity=false;encrypt=false;trustServerCertificate=false
