# ============================================================
#  Profil PROD
#  Les secrets sont injectés via variables d'environnement :
#    DB_HOST, DB_NAME, DB_USER, DB_PASSWORD, JWT_SECRET
# ============================================================

# Base de données
spring.datasource.url=jdbc:sqlserver://${DB_HOST:localhost};database=${DB_NAME:bookhub};integratedSecurity=false;encrypt=true;trustServerCertificate=false
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Pool de connexions (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JWT — secret injecté depuis l'environnement
jwt.secret=${JWT_SECRET}

# SQL — aucun log SQL en production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logs applicatifs — INFO uniquement, écriture dans un fichier rotatif
logging.level.root=WARN
logging.level.fr.eni.bookhub=INFO
logging.file.name=logs/bookhub.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=200MB

# Swagger désactivé en production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
